name: Generate contribution snake

# Builds the contribution-graph snake animation and pushes it to the
# `output` branch, where the README references it. Runs on a daily schedule,
# on every push to the default branch, and on manual trigger.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-light&color_snake=3D3DDC&color_dots=#ebedf0,#c6c6f5,#9a9af0,#5a5ae0,#2828B5

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
