name: Update latest Medium posts

# Pulls the latest posts from the Medium RSS feed and injects them into the
# README between the BLOG-POST-LIST markers. Runs daily and on manual trigger.
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest Medium posts into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://ambuj4373.medium.com/feed"
          max_post_count: 5
          template: "- [$title]($url)<br/>"
          commit_message: "Update latest Medium posts"
